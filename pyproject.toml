[project]
name = "snd-revenue-service"
version = "0.1.0"
description = "Discord audit bot for Stand and Deliver"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "discord.py>=2.5,<3",
  "tomli>=2.2.1; python_version < '3.11'",
]

[dependency-groups]
dev = [
  "pytest>=8.3,<9",
  "pytest-asyncio>=0.25,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.uv]
package = true
