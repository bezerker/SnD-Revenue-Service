apiVersion: apps/v1
kind: Deployment
metadata:
  name: snd-revenue-service
  namespace: snd-revenue
  labels:
    app.kubernetes.io/name: snd-revenue-service
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: snd-revenue-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snd-revenue-service
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 15
      containers:
        - name: bot
          image: bezerker/snd-revenue-service:latest
          imagePullPolicy: Always
          env:
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: snd-revenue-service
                  key: discord-token
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: snd-revenue-service
                  key: openai-api-key
            - name: SND_REVENUE_CONFIG
              value: /config/config.toml
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: snd-revenue-service-config
            items:
              - key: config.toml
                path: config.toml
