name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest -v
      - name: Build image
        run: docker build -t snd-revenue-service:ci .
