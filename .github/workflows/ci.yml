name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      UV_VERSION: "0.10.9"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install "uv==${UV_VERSION}"
      - name: Sync dependencies
        run: uv sync --frozen --all-groups
      - name: Run tests
        run: uv run pytest -v
      - name: Build image
        run: docker build -t snd-revenue-service:ci .
